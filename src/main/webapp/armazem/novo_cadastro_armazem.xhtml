<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <body>
        <ui:composition template="./../WEB-INF/templates/template_administracao.xhtml">
            <ui:define name="content">

                <p:growl id="msgs" showDetail="true" life="4000"/>

                <h:form id="frmArmazem">
                    <p:panel header="Cadastro de Produto no Armazém"
                             style="max-width:620px; margin:auto;">

                        <h:panelGrid columns="2" cellpadding="10" style="width:100%;">

                            <h:outputLabel value="ID Produto:" for="idProduto"/>
                            <p:inputNumber id="idProduto"
                                           value="#{armazem.armazem.idProduto}"
                                           required="true"
                                           requiredMessage="Informe o ID do produto"/>

                            <h:outputLabel value="Preço (Kz):" for="preco"/>
                            <p:inputNumber id="preco"
                                           value="#{armazem.armazem.precoProduto}"
                                           symbol="Kz "
                                           symbolPosition="prefix"
                                           decimalPlaces="2"
                                           required="true"
                                           requiredMessage="Informe o preço"/>

                            <h:outputLabel value="Quantidade:" for="qtd"/>
                            <p:inputNumber id="qtd"
                                           value="#{armazem.armazem.quantidadeProduto}"
                                           required="true"
                                          
                                           requiredMessage="Informe a quantidade"/>

                            <h:outputLabel value="Data de Compra:" for="dataCompra"/>
                            <p:datePicker id="dataCompra"
                                          value="#{armazem.armazem.dataCompra}"
                                          pattern="dd/MM/yyyy"
                                          showIcon="true"
                                          maxdate="#{armazem.hoje}"/>

                        </h:panelGrid>

                        <p:separator/>

                        <div style="text-align:center; margin-top:15px;">
                            <p:commandButton value="Guardar"
                                             action="#{armazem.salvar}"
                                             update="frmArmazem msgs"
                                             icon="pi pi-save"
                                             styleClass="ui-button-success"
                                             style="margin-right:10px;"/>
                            <p:commandButton value="Limpar"
                                             action="#{armazem.novo}"
                                             update="frmArmazem"
                                             icon="pi pi-refresh"
                                             styleClass="ui-button-secondary"
                                             immediate="true"/>
                        </div>
                    </p:panel>
                </h:form>

            </ui:define>
        </ui:composition>
    </body>
</html>
