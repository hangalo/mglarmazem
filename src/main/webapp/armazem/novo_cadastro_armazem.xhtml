<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
    <body>
        <ui:composition template="./../WEB-INF/templates/template_administracao.xhtml">
            <ui:define name="content">
                <h:form id="frmArmazem">

                    <p:growl id="msgs" showDetail="true" life="4000"/>

                    <p:panel header="Cadastro de Produto no Armazém" style="max-width:620px; margin:auto 0 20px 0;">
                        <h:panelGrid columns="2" cellpadding="10" style="width:100%;">

                            <h:outputLabel value="Código do Produto:" for="idProduto"/>
                            <p:inputText id="idProduto"
                                         value="#{armazem.armazem.idProduto}"
                                         required="true"
                                         requiredMessage="Informe o Código do produto">
                                <f:convertNumber integerOnly="true"/>
                            </p:inputText>

                            <h:outputLabel value="Preço (Kz):" for="preco"/>
                            <p:inputText id="preco"
                                         value="#{armazem.armazem.precoProduto}"
                                         required="true"
                                         requiredMessage="Informe o preço">
                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            </p:inputText>

                            <h:outputLabel value="Quantidade:" for="qtd"/>
                            <p:inputText id="qtd"
                                         value="#{armazem.armazem.quantidadeProduto}"
                                         required="true"
                                         requiredMessage="Informe a quantidade">
                                <f:convertNumber integerOnly="true"/>
                            </p:inputText>

                            <h:outputLabel value="Data de Compra:" for="dataCompra"/>
                            <p:datePicker id="dataCompra"
                                          value="#{armazem.armazem.dataCompra}"
                                          pattern="dd/MM/yyyy"
                                          showIcon="true"
                                          maxdate="#{armazem.hoje}"/>

                        </h:panelGrid>

                        <p:separator/>

                        <div style="text-align:center; margin-top:15px;">
                            <p:commandButton value="Guardar"
                                             action="#{armazem.salvar}"
                                             update="frmArmazem"
                                             icon="pi pi-save"
                                             styleClass="ui-button-success"
                                             style="margin-right:10px;"/>

                            <p:commandButton value="Limpar"
                                             action="#{armazem.novo}"
                                             update="frmArmazem"
                                             icon="pi pi-refresh"
                                             styleClass="ui-button-secondary"
                                             immediate="true"/>
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </body>
</html>
